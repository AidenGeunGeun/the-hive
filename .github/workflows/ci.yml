name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test

  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CLI must not import protocol/engine
        run: |
          if grep -r "protocol/engine" packages/cli/src/; then
            echo "ERROR: cli must only import from protocol/wire"
            exit 1
          fi
      - name: No package imports server
        run: |
          for pkg in protocol config context providers room workflow storage cli; do
            if grep -r "@the-hive/server" "packages/$pkg/src/" 2>/dev/null; then
              echo "ERROR: packages/$pkg imports server"
              exit 1
            fi
          done
